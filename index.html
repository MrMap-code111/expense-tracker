<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Quản lý chi tiêu - Đồng bộ đám mây</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Card tổng quan */
        .summary {
            background: white;
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .balance {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .balance-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            color: #333;
        }

        .income-expense {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .income-box, .expense-box {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-radius: 18px;
        }

        .income-box {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
        }

        .expense-box {
            background: linear-gradient(135deg, #fbc2c2 0%, #ff9a9e 100%);
        }

        .income-box h4, .expense-box h4 {
            font-size: 13px;
            color: rgba(0,0,0,0.6);
            margin-bottom: 8px;
        }

        .income-amount {
            color: #2d6a4f;
            font-size: 22px;
            font-weight: bold;
        }

        .expense-amount {
            color: #c92a2a;
            font-size: 22px;
            font-weight: bold;
        }

        /* Form thêm giao dịch */
        .add-transaction {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .type-buttons {
            display: flex;
            gap: 12px;
        }

        .type-btn {
            flex: 1;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            text-align: center;
            padding: 12px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .type-btn.income {
            color: #2d6a4f;
        }

        .type-btn.expense {
            color: #c92a2a;
        }

        .type-btn.active.income {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            color: #1b4d3e;
        }

        .type-btn.active.expense {
            background: linear-gradient(135deg, #fbc2c2 0%, #ff9a9e 100%);
            color: #a61e1e;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Danh sách giao dịch */
        .transactions {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .transaction-date {
            font-size: 11px;
            color: #aaa;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 16px;
            margin-right: 12px;
        }

        .income-text {
            color: #2d6a4f;
        }

        .expense-text {
            color: #c92a2a;
        }

        .delete-btn {
            background: #fee2e2;
            color: #c92a2a;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            width: auto;
            transition: all 0.2s;
        }

        .delete-btn:active {
            background: #ffc9c9;
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            padding: 40px 20px;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .clear-all {
            background: #fee2e2;
            color: #c92a2a;
            margin-top: 15px;
            width: auto;
            padding: 10px 20px;
            font-size: 13px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .sync-status {
            text-align: center;
            font-size: 11px;
            padding: 8px;
            margin-top: 12px;
            border-radius: 30px;
            background: #f0f0f0;
            color: #666;
        }

        .status-connected {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        /* Categories sidebar/menu */
        .categories-container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .categories-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .categories-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .add-category-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .categories-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .category-item {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .category-item .delete-category {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
        }
        .category-item.active .delete-category {
            color: rgba(255,255,255,0.7);
        }
        .current-category {
            background: #667eea10;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }
        /* Nút xem tất cả */
        .view-all-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            margin-left: auto;
        }
        .view-all-btn:hover {
            background: #5a67d8;
        }
        .categories-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Quản lý chi tiêu</h1>
            <p>Đồng bộ thời gian thực • Mọi thiết bị</p>
        </div>

        <div class="summary">
            <div class="balance">
                <div class="balance-label">Tổng số dư</div>
                <div class="balance-amount" id="balance">0₫</div>
            </div>
            <div class="income-expense">
                <div class="income-box">
                    <h4>📈 Thu nhập</h4>
                    <div class="income-amount" id="totalIncome">0₫</div>
                </div>
                <div class="expense-box">
                    <h4>📉 Chi tiêu</h4>
                    <div class="expense-amount" id="totalExpense">0₫</div>
                </div>
            </div>
        </div>

                <!-- Phần hạng mục -->
        <div class="categories-container">
            <div class="categories-header">
                <div class="categories-title">📂 Hạng mục</div>
                <div style="display: flex; gap: 10px;">
                    <button id="viewAllBtn" class="view-all-btn">📋 Xem tất cả</button>
                    <button id="addCategoryBtn" class="add-category-btn">+ Thêm mới</button>
                </div>
            </div>
            <div id="categoriesList" class="categories-list">
                <!-- Categories sẽ hiển thị ở đây -->
            </div>
        </div>
        
        <!-- Hiển thị hạng mục đang chọn -->
        <div id="currentCategoryDisplay" class="current-category">
            📍 Đang xem: Tất cả giao dịch
        </div>
        
        <div class="add-transaction">
            <div class="section-title">
                <span>➕</span> Thêm giao dịch mới
            </div>
            <form id="transactionForm">
                <div class="form-group">
                    <input type="text" id="description" placeholder="Tên giao dịch (VD: Ăn sáng, Lương...)" required>
                </div>
                <div class="form-group">
                    <input type="number" id="amount" placeholder="Số tiền" step="1000" required>
                </div>
                <div class="form-group">
                    <div class="type-buttons">
                        <button type="button" class="type-btn income active" data-type="income">💰 Thu nhập</button>
                        <button type="button" class="type-btn expense" data-type="expense">💸 Chi tiêu</button>
                    </div>
                </div>
                <button type="submit">➕ Thêm giao dịch</button>
            </form>
        </div>

        <div class="transactions">
            <div class="section-title">
                <span>📋</span> Lịch sử giao dịch
            </div>
            <div class="transaction-list" id="transactionList">
                <div class="empty-state"><span>📭</span> Đang tải dữ liệu...</div>
            </div>
            <button id="clearAllBtn" class="clear-all" style="display: none;">🗑️ Xóa tất cả</button>
            <div class="sync-status" id="syncStatus">🔄 Đang kết nối...</div>
        </div>
    </div>

    <script>
        // === THÔNG TIN KẾT NỐI (GIỮ NGUYÊN NHƯ CODE CŨ ĐANG CHẠY) ===
        const SUPABASE_URL = 'https://oygozffveggeasqhmrnp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Z296ZmZ2ZWdnZWFzcWhtcm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjE3NTEsImV4cCI6MjA5MTAzNzc1MX0.qPM1Crc3jSYu1ChEE7u5TOu6v8_Z4pPeliZ0VGa0yLU';
        
        // Khởi tạo Supabase (GIỮ NGUYÊN CÁCH KHỞI TẠO CỦA CODE CŨ)
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // Quản lý categories
        let categories = [];
        let currentCategory = null; // null = tất cả, hoặc tên category

        // Khởi tạo categories từ database
        async function initCategories() {
            console.log('Đang tải categories từ database...');
            
            const { data, error } = await _supabase
                .from('categories')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error('Lỗi tải categories:', error);
                // Fallback: dùng categories mặc định
                categories = ['Ăn uống', 'Di chuyển', 'Giải trí', 'Sức khỏe', 'Hóa đơn', 'Mua sắm', 'Khác'];
                renderCategories();
                return;
            }
            
            if (data && data.length > 0) {
                categories = data.map(c => c.name);
                console.log('Đã tải', categories.length, 'categories từ database');
            } else {
                // Không có categories trong database, tạo mặc định
                categories = ['Ăn uống', 'Di chuyển', 'Giải trí', 'Sức khỏe', 'Hóa đơn', 'Mua sắm', 'Khác'];
                console.log('Chưa có categories, tạo mặc định...');
                
                for (let cat of categories) {
                    await _supabase.from('categories').insert([{ name: cat }]);
                }
            }
            renderCategories();
        }
        
        // Hiển thị danh sách categories
        function renderCategories() {
            const container = document.getElementById('categoriesList');
            if (!container) return; // Thoát nếu chưa có element
            
            if (categories.length === 0) {
                container.innerHTML = '<div style="padding: 10px; color: #999;">Chưa có hạng mục</div>';
                return;
            }
            
            container.innerHTML = categories.map(cat => `
                <div class="category-item ${currentCategory === cat ? 'active' : ''}" onclick="selectCategory('${escapeHtml(cat)}')">
                    <span>${escapeHtml(cat)}</span>
                    <button class="delete-category" onclick="event.stopPropagation(); deleteCategory('${escapeHtml(cat)}')">✕</button>
                </div>
            `).join('');
            
            // Cập nhật hiển thị hạng mục đang chọn
            const displayEl = document.getElementById('currentCategoryDisplay');
            if (displayEl) {
                if (currentCategory) {
                    displayEl.innerHTML = `📍 Đang xem: ${escapeHtml(currentCategory)}`;
                } else {
                    displayEl.innerHTML = `📍 Đang xem: Tất cả giao dịch`;
                }
            }
        }
        
        // Chọn category (thêm vào window để gọi từ onclick)
        window.selectCategory = function(category) {
            if (currentCategory === category) {
                currentCategory = null; // Bỏ chọn
            } else {
                currentCategory = category;
            }
            renderCategories();
            loadData(); // Tải lại dữ liệu theo category
        }
        
        // Thêm category mới lên database
        async function addNewCategory() {
            const newCat = prompt('Nhập tên hạng mục mới:');
            if (newCat && newCat.trim()) {
                const catName = newCat.trim();
                
                if (categories.includes(catName)) {
                    alert('Hạng mục đã tồn tại!');
                    return;
                }
                
                const { error } = await _supabase
                    .from('categories')
                    .insert([{ name: catName }]);
                
                if (error) {
                    console.error('Lỗi thêm category:', error);
                    alert('Lỗi: ' + error.message);
                } else {
                    console.log('Đã thêm category:', catName);
                    
                    // 👇 THÊM CÁC DÒNG NÀY ĐỂ CẬP NHẬT GIAO DIỆN NGAY
                    // Thêm category mới vào mảng categories trong bộ nhớ
                    categories.push(catName);
                    
                    // Cập nhật lại giao diện categories ngay lập tức
                    renderCategories();
                }
            }
        }
        
        window.deleteCategory = async function(category) {
            if (category === 'Khác') {
                alert('Không thể xóa hạng mục "Khác"!');
                return;
            }
            
            if (confirm(`Xóa hạng mục "${category}"?\n\nCác giao dịch thuộc hạng mục này sẽ chuyển thành "Khác".`)) {
                // Xóa category khỏi bảng categories
                const { error } = await _supabase
                    .from('categories')
                    .delete()
                    .eq('name', category);
                
                if (error) {
                    console.error('Lỗi xóa category:', error);
                    alert('Lỗi: ' + error.message);
                    return;
                }
                
                // Cập nhật các giao dịch cũ về 'Khác'
                await _supabase
                    .from('transactions')
                    .update({ category: 'Khác' })
                    .eq('category', category);
                
                // 👇 THÊM CÁC DÒNG NÀY ĐỂ CẬP NHẬT GIAO DIỆN NGAY
                // Xóa category khỏi mảng categories trong bộ nhớ
                categories = categories.filter(c => c !== category);
                
                // Nếu đang chọn category bị xóa, chuyển về Tất cả
                if (currentCategory === category) {
                    currentCategory = null;
                }
                
                // Cập nhật lại giao diện categories ngay lập tức
                renderCategories();
                
                // Tải lại dữ liệu giao dịch
                loadData();
                
                console.log('Đã xóa category và cập nhật giao diện:', category);
            }
        };
        
        // Tạo ID thiết bị (GIỮ NGUYÊN)
        let deviceId = localStorage.getItem('device_id');
        if (!deviceId) {
            deviceId = crypto.randomUUID();
            localStorage.setItem('device_id', deviceId);
        }
        console.log('Device ID:', deviceId);

        // Hàm format tiền
        function formatMoney(amount) {
            return amount.toLocaleString('vi-VN') + '₫';
        }

        // Lấy ngày hiện tại
        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        // Cập nhật tổng thu/chi/số dư
        function updateSummary(transactions) {
            let totalIncome = 0, totalExpense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            
            document.getElementById('balance').textContent = formatMoney(totalIncome - totalExpense);
            document.getElementById('totalIncome').textContent = formatMoney(totalIncome);
            document.getElementById('totalExpense').textContent = formatMoney(totalExpense);
        }

        // Hiển thị danh sách giao dịch
        function renderTransactions(transactions) {
            const listEl = document.getElementById('transactionList');
            const clearBtn = document.getElementById('clearAllBtn');
            
            if (!transactions || transactions.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><span>📭</span> Chưa có giao dịch nào</div>';
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'inline-block';
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            listEl.innerHTML = sorted.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-name">${escapeHtml(t.description)}</div>
                        <div class="transaction-date">${t.date} • ${escapeHtml(t.category || 'Khác')}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'income' ? 'income-text' : 'expense-text'}">
                        ${t.type === 'income' ? '+' : '-'} ${formatMoney(t.amount)}
                    </div>
                    <button class="delete-btn" onclick="deleteTransaction('${t.id}')">✕ Xóa</button>
                </div>
            `).join('');
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Tải dữ liệu - GIỮ NGUYÊN CÁCH LẤY DỮ LIỆU NHƯ CODE CŨ
        async function loadData() {
            console.log('Đang tải dữ liệu...');
            
            // Tạo query cơ bản
            let query = _supabase.from('transactions').select('*');
            
            // Lọc theo category nếu đang chọn (currentCategory không phải null)
            if (currentCategory) {
                query = query.eq('category', currentCategory);
            }
            
            // Thực hiện query và sắp xếp theo ngày
            const { data, error } = await query.order('date', { ascending: false });
            
            if (error) {
                console.error('Lỗi tải dữ liệu:', error);
                document.getElementById('transactionList').innerHTML = `<div class="empty-state">❌ Lỗi: ${error.message}</div>`;
                const syncDiv = document.getElementById('syncStatus');
                if (syncDiv) {
                    syncDiv.className = 'sync-status status-error';
                    syncDiv.innerHTML = `❌ Lỗi: ${error.message}`;
                }
                return;
            }
            
            console.log('Đã tải', data?.length || 0, 'giao dịch', currentCategory ? `(Lọc theo: ${currentCategory})` : '(Tất cả)');
            renderTransactions(data || []);
            updateSummary(data || []);
            
            const syncDiv = document.getElementById('syncStatus');
            if (syncDiv) {
                syncDiv.className = 'sync-status status-connected';
                syncDiv.innerHTML = '✅ Đồng bộ thời gian thực | ' + new Date().toLocaleTimeString();
            }
        }

        // Xóa giao dịch (GIỮ NGUYÊN)
        window.deleteTransaction = async (id) => {
            if (!confirm('Xóa giao dịch này?')) return;
            
            const { error } = await _supabase.from('transactions').delete().eq('id', id);
            if (error) {
                alert('Lỗi: ' + error.message);
            } else {
                console.log('Đã xóa giao dịch:', id);
                loadData(); // Tải lại dữ liệu sau khi xóa
            }
        };

        // Xóa tất cả giao dịch của thiết bị hiện tại (GIỮ NGUYÊN)
        async function deleteAllTransactions() {
            if (!confirm('⚠️ Xóa TẤT CẢ giao dịch?\n\nHành động này không thể hoàn tác!')) return;
            
            const { error } = await _supabase
                .from('transactions')
                .delete()
                .neq('id', '00000000-0000-0000-0000-000000000000');
            
            if (error) {
                console.error('Lỗi xóa tất cả:', error);
                alert('Lỗi: ' + error.message);
            } else {
                console.log('Đã xóa tất cả giao dịch');
                
                // 👇 THÊM DÒNG NÀY - Tải lại dữ liệu ngay
                loadData();
                
                // Hiệu ứng thông báo
                const syncDiv = document.getElementById('syncStatus');
                if (syncDiv) {
                    syncDiv.className = 'sync-status status-connected';
                    syncDiv.innerHTML = '🗑️ Đã xóa tất cả | ' + new Date().toLocaleTimeString();
                    setTimeout(() => {
                        if (syncDiv) syncDiv.innerHTML = '✅ Đồng bộ thời gian thực';
                    }, 2000);
                }
            }
        }

        // Thêm giao dịch mới (GIỮ NGUYÊN)
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const description = document.getElementById('description').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.querySelector('.type-btn.active').getAttribute('data-type');
            
            if (!description) {
                alert('Vui lòng nhập tên giao dịch');
                return;
            }
            
            if (isNaN(amount) || amount <= 0) {
                alert('Vui lòng nhập số tiền hợp lệ');
                return;
            }
            
            // Lấy category đang chọn (nếu có), mặc định là 'Khác'
            const selectedCategory = currentCategory || 'Khác';

            const { error } = await _supabase.from('transactions').insert([{
                description: description,
                amount: amount,
                type: type,
                date: getTodayDate(),
                user_id: deviceId,
                category: selectedCategory
            }]);
            
            if (error) {
                console.error('Lỗi insert:', error);
                alert('Lỗi: ' + error.message);
            } else {
                document.getElementById('description').value = '';
                document.getElementById('amount').value = '';
                
                // 👇 THÊM DÒNG NÀY - Tải lại dữ liệu ngay
                loadData();
                
                // Hiệu ứng thông báo
                const syncDiv = document.getElementById('syncStatus');
                if (syncDiv) {
                    syncDiv.className = 'sync-status status-connected';
                    syncDiv.innerHTML = '✅ Đã thêm giao dịch | ' + new Date().toLocaleTimeString();
                    setTimeout(() => {
                        if (syncDiv) syncDiv.innerHTML = '✅ Đồng bộ thời gian thực';
                    }, 2000);
                }
            }
        });
        // Chuyển đổi loại giao dịch
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        // Gán sự kiện xóa tất cả
        document.getElementById('clearAllBtn').addEventListener('click', deleteAllTransactions);
        
        // 👇 THÊM SỰ KIỆN CHO NÚT THÊM HẠNG MỤC (Bước 8)
        const addCategoryBtn = document.getElementById('addCategoryBtn');
        if (addCategoryBtn) {
            addCategoryBtn.addEventListener('click', addNewCategory);
        }
        // Nút "Xem tất cả" - bỏ chọn category đang chọn
        const viewAllBtn = document.getElementById('viewAllBtn');
        if (viewAllBtn) {
            viewAllBtn.addEventListener('click', () => {
                if (currentCategory !== null) {
                    currentCategory = null;
                    renderCategories();
                    loadData();
                }
            });
        }
        // THIẾT LẬP REALTIME - LẮNG NGHE THAY ĐỔI TỪ DATABASE
        // Lắng nghe cả bảng transactions và categories
        const channel = _supabase.channel('public:all');
        
        channel
            // Lắng nghe thay đổi trên bảng transactions
            .on('postgres_changes', 
                { 
                    event: '*',
                    schema: 'public', 
                    table: 'transactions' 
                }, 
                (payload) => {
                    console.log('[Realtime] Transactions thay đổi:', payload.eventType);
                    loadData();
                    
                    const syncDiv = document.getElementById('syncStatus');
                    if (syncDiv) {
                        syncDiv.className = 'sync-status status-connected';
                        syncDiv.innerHTML = '✅ Đã đồng bộ | ' + new Date().toLocaleTimeString();
                    }
                }
            )
            // 👇 THÊM PHẦN NÀY: Lắng nghe thay đổi trên bảng categories
            .on('postgres_changes',
                { 
                    event: '*',
                    schema: 'public', 
                    table: 'categories' 
                },
                (payload) => {
                    console.log('[Realtime] Categories thay đổi:', payload.eventType);
                    initCategories();  // Tải lại danh sách categories
                }
            )
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('[Realtime] Đã kết nối thành công!');
                    const syncDiv = document.getElementById('syncStatus');
                    if (syncDiv) {
                        syncDiv.className = 'sync-status status-connected';
                        syncDiv.innerHTML = '✅ Đồng bộ thời gian thực';
                    }
                }
            });
        
        // 👇 SỬA PHẦN KHỞI ĐỘNG: Thêm initCategories() trước loadData()
        console.log('Khởi động ứng dụng...');
        initCategories();  // 👈 THÊM DÒNG NÀY
        loadData();
    </script>
</body>
</html>
