<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Quản lý chi tiêu tháng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Card tổng quan */
        .summary {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .balance {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }

        .income-expense {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .income-box, .expense-box {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            background: #f8f9fa;
        }

        .income-box h4, .expense-box h4 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .income-amount {
            color: #28a745;
            font-size: 20px;
            font-weight: bold;
        }

        .expense-amount {
            color: #dc3545;
            font-size: 20px;
            font-weight: bold;
        }

        /* Form thêm giao dịch */
        .add-transaction {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .type-buttons {
            display: flex;
            gap: 10px;
        }

        .type-btn {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .type-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Danh sách giao dịch */
        .transactions {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .transactions h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .transaction-date {
            font-size: 12px;
            color: #999;
        }

        .transaction-amount {
            font-weight: bold;
            font-size: 16px;
            margin-right: 15px;
        }

        .income-text {
            color: #28a745;
        }

        .expense-text {
            color: #dc3545;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        /* Nút xóa tất cả */
        .clear-all {
            background: #dc3545;
            margin-top: 15px;
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Thống kê -->
        <div class="summary">
            <div class="balance">
                <div class="balance-label">Tổng số dư</div>
                <div class="balance-amount" id="balance">0₫</div>
            </div>
            <div class="income-expense">
                <div class="income-box">
                    <h4>Thu nhập</h4>
                    <div class="income-amount" id="totalIncome">0₫</div>
                </div>
                <div class="expense-box">
                    <h4>Chi tiêu</h4>
                    <div class="expense-amount" id="totalExpense">0₫</div>
                </div>
            </div>
        </div>

        <!-- Thêm giao dịch -->
        <div class="add-transaction">
            <form id="transactionForm">
                <div class="form-group">
                    <input type="text" id="description" placeholder="Tên giao dịch (VD: Mua sắm, Lương...)" required>
                </div>
                <div class="form-group">
                    <input type="number" id="amount" placeholder="Số tiền" step="1000" required>
                </div>
                <div class="form-group">
                    <div class="type-buttons">
                        <button type="button" class="type-btn active" data-type="income">📈 Thu nhập</button>
                        <button type="button" class="type-btn" data-type="expense">📉 Chi tiêu</button>
                    </div>
                </div>
                <button type="submit">➕ Thêm giao dịch</button>
            </form>
        </div>

        <!-- Danh sách giao dịch -->
        <div class="transactions">
            <h3>📋 Lịch sử giao dịch</h3>
            <div class="transaction-list" id="transactionList">
                <div class="empty-state">Chưa có giao dịch nào</div>
            </div>
            <button class="clear-all" id="clearAllBtn" style="display: none;">🗑️ Xóa tất cả</button>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu ban đầu
        let transactions = [
            { id: 1, description: "Lương tháng 3", amount: 15000000, type: "income", date: "2026-03-01" },
            { id: 2, description: "Ăn uống", amount: 3500000, type: "expense", date: "2026-03-05" },
            { id: 3, description: "Tiền nhà", amount: 4000000, type: "expense", date: "2026-03-02" }
        ];

        // Load dữ liệu từ localStorage
        function loadData() {
            const saved = localStorage.getItem('expenses_data');
            if (saved) {
                transactions = JSON.parse(saved);
            } else {
                saveData(); // Lưu dữ liệu mẫu
            }
        }

        // Lưu dữ liệu vào localStorage
        function saveData() {
            localStorage.setItem('expenses_data', JSON.stringify(transactions));
        }

        // Format số tiền
        function formatMoney(amount) {
            return amount.toLocaleString('vi-VN') + '₫';
        }

        // Tính tổng thu/chi/số dư
        function calculateTotals() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const balance = totalIncome - totalExpense;
            
            return { totalIncome, totalExpense, balance };
        }

        // Cập nhật giao diện thống kê
        function updateSummary() {
            const { totalIncome, totalExpense, balance } = calculateTotals();
            document.getElementById('balance').textContent = formatMoney(balance);
            document.getElementById('totalIncome').textContent = formatMoney(totalIncome);
            document.getElementById('totalExpense').textContent = formatMoney(totalExpense);
        }

        // Hiển thị danh sách giao dịch
        function renderTransactions() {
            const listEl = document.getElementById('transactionList');
            const clearBtn = document.getElementById('clearAllBtn');
            
            if (transactions.length === 0) {
                listEl.innerHTML = '<div class="empty-state">📭 Chưa có giao dịch nào</div>';
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'block';
            
            // Sắp xếp theo ngày mới nhất
            const sorted = [...transactions].reverse();
            
            listEl.innerHTML = sorted.map(trans => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-name">${escapeHtml(trans.description)}</div>
                        <div class="transaction-date">${trans.date}</div>
                    </div>
                    <div class="transaction-amount ${trans.type === 'income' ? 'income-text' : 'expense-text'}">
                        ${trans.type === 'income' ? '+' : '-'} ${formatMoney(trans.amount)}
                    </div>
                    <button class="delete-btn" onclick="deleteTransaction(${trans.id})">Xóa</button>
                </div>
            `).join('');
        }

        // Xóa giao dịch
        function deleteTransaction(id) {
            if (confirm('Bạn có chắc muốn xóa giao dịch này?')) {
                transactions = transactions.filter(t => t.id !== id);
                saveData();
                updateSummary();
                renderTransactions();
            }
        }

        // Xóa tất cả
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('⚠️ Bạn có chắc muốn xóa TẤT CẢ giao dịch? Hành động này không thể hoàn tác!')) {
                transactions = [];
                saveData();
                updateSummary();
                renderTransactions();
            }
        });

        // Escape HTML để tránh XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Lấy ngày hiện tại (YYYY-MM-DD)
        function getTodayDate() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        // Thêm giao dịch mới
        document.getElementById('transactionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const description = document.getElementById('description').value.trim();
            let amount = parseFloat(document.getElementById('amount').value);
            const type = document.querySelector('.type-btn.active').getAttribute('data-type');
            
            if (!description) {
                alert('Vui lòng nhập tên giao dịch');
                return;
            }
            
            if (isNaN(amount) || amount <= 0) {
                alert('Vui lòng nhập số tiền hợp lệ (lớn hơn 0)');
                return;
            }
            
            // Tạo ID mới
            const newId = transactions.length > 0 ? Math.max(...transactions.map(t => t.id)) + 1 : 1;
            
            const newTransaction = {
                id: newId,
                description: description,
                amount: amount,
                type: type,
                date: getTodayDate()
            };
            
            transactions.push(newTransaction);
            saveData();
            
            // Reset form
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            
            // Cập nhật giao diện
            updateSummary();
            renderTransactions();
            
            // Hiệu ứng nhẹ
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.style.transform = 'scale(0.98)';
            setTimeout(() => submitBtn.style.transform = '', 200);
        });
        
        // Chuyển đổi loại giao dịch (Thu/Chi)
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        // Khởi tạo
        loadData();
        updateSummary();
        renderTransactions();
    </script>
</body>
</html>
