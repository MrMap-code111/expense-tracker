<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quản lý chi tiêu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .summary { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .balance { text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 36px; font-weight: bold; color: #333; }
        .income-expense { display: flex; gap: 15px; }
        .income-box, .expense-box { flex: 1; text-align: center; padding: 15px; background: #f8f9fa; border-radius: 15px; }
        .income-amount { color: #28a745; font-size: 20px; font-weight: bold; }
        .expense-amount { color: #dc3545; font-size: 20px; font-weight: bold; }
        .add-transaction { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        .type-buttons { display: flex; gap: 10px; }
        .type-btn { flex: 1; background: #f8f9fa; border: 2px solid #e0e0e0; cursor: pointer; text-align: center; padding: 12px; border-radius: 12px; }
        .type-btn.active { background: #667eea; color: white; }
        .transactions { background: white; border-radius: 20px; padding: 20px; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; width: auto; }
        .empty-state { text-align: center; color: #999; padding: 30px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="summary">
            <div class="balance">
                <div class="balance-amount" id="balance">0₫</div>
            </div>
            <div class="income-expense">
                <div class="income-box"><h4>Thu nhập</h4><div class="income-amount" id="totalIncome">0₫</div></div>
                <div class="expense-box"><h4>Chi tiêu</h4><div class="expense-amount" id="totalExpense">0₫</div></div>
            </div>
        </div>

        <div class="add-transaction">
            <form id="transactionForm">
                <div class="form-group"><input type="text" id="description" placeholder="Tên giao dịch" required></div>
                <div class="form-group"><input type="number" id="amount" placeholder="Số tiền" required></div>
                <div class="form-group">
                    <div class="type-buttons">
                        <button type="button" class="type-btn active" data-type="income">Thu nhập</button>
                        <button type="button" class="type-btn" data-type="expense">Chi tiêu</button>
                    </div>
                </div>
                <button type="submit">Thêm giao dịch</button>
            </form>
        </div>

        <div class="transactions">
            <h3>Lịch sử giao dịch</h3>
            <div id="transactionList"><div class="empty-state">Đang tải...</div></div>
            <button id="clearAllBtn" style="margin-top: 15px; background: #dc3545; display: none;">Xóa tất cả</button>
        </div>
    </div>

    <script>
        // === THAY THÔNG TIN CỦA BẠN VÀO ĐÂY ===
        const SUPABASE_URL = 'https://oygozffveggeasqhmrnp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Z296ZmZ2ZWdnZWFzcWhtcm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjE3NTEsImV4cCI6MjA5MTAzNzc1MX0.qPM1Crc3jSYu1ChEE7u5TOu6v8_Z4pPeliZ0VGa0yLU';
        // ====================================

        // Khởi tạo - CHỈ MỘT DÒNG DUY NHẤT
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Tạo ID thiết bị
        let deviceId = localStorage.getItem('device_id');
        if (!deviceId) {
            deviceId = crypto.randomUUID();
            localStorage.setItem('device_id', deviceId);
        }

        function formatMoney(amount) {
            return amount.toLocaleString('vi-VN') + '₫';
        }

        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        async function loadData() {
            const { data, error } = await _supabase
                .from('transactions')
                .select('*')
                .eq('user_id', deviceId);
            
            if (error) {
                console.log('Lỗi:', error);
                return;
            }
            
            // Tính tổng
            let totalIncome = 0, totalExpense = 0;
            data.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            
            document.getElementById('balance').textContent = formatMoney(totalIncome - totalExpense);
            document.getElementById('totalIncome').textContent = formatMoney(totalIncome);
            document.getElementById('totalExpense').textContent = formatMoney(totalExpense);
            
            // Hiển thị danh sách
            const listEl = document.getElementById('transactionList');
            const clearBtn = document.getElementById('clearAllBtn');
            
            if (data.length === 0) {
                listEl.innerHTML = '<div class="empty-state">Chưa có giao dịch</div>';
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'block';
            listEl.innerHTML = data.map(t => `
                <div class="transaction-item">
                    <div>
                        <div><strong>${t.description}</strong></div>
                        <div style="font-size: 12px; color: #999;">${t.date}</div>
                    </div>
                    <div style="color: ${t.type === 'income' ? '#28a745' : '#dc3545'}; font-weight: bold;">
                        ${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}
                    </div>
                    <button class="delete-btn" onclick="deleteTransaction('${t.id}')">Xóa</button>
                </div>
            `).join('');
        }

        window.deleteTransaction = async (id) => {
            if (confirm('Xóa?')) {
                await _supabase.from('transactions').delete().eq('id', id);
                loadData();
            }
        };

        document.getElementById('clearAllBtn').onclick = async () => {
            if (confirm('Xóa tất cả?')) {
                await _supabase.from('transactions').delete().eq('user_id', deviceId);
                loadData();
            }
        };

        document.getElementById('transactionForm').onsubmit = async (e) => {
            e.preventDefault();
            const description = document.getElementById('description').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.querySelector('.type-btn.active').getAttribute('data-type');
            
            if (!description || !amount) return alert('Nhập đầy đủ thông tin');
            
            await _supabase.from('transactions').insert([{
                description, amount, type, date: getTodayDate(), user_id: deviceId
            }]);
            
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            loadData();
        };

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        // Lắng nghe thay đổi realtime
        _supabase.channel('public')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, () => loadData())
            .subscribe();

        loadData();
    </script>
</body>
</html>
